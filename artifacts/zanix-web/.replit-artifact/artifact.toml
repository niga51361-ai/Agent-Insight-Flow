kind = "web"
previewPath = "/"
title = "Zanix AI"
version = "1.0.0"
id = "artifacts/zanix-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21033

[services.development]
run = "pnpm --filter @workspace/zanix-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/zanix-web", "run", "build" ]
publicDir = "artifacts/zanix-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21033"
BASE_PATH = "/"
